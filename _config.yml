# Site Configuration for PRICE Workshop 2026
name: "Performance, Rendering, and Interaction for Competitive Esports"
title: "PRICE @ SIGGRAPH 2026"
description: "Technical Workshop on Performance, Rendering, and Interaction for Competitive Esports at SIGGRAPH 2026"
url: "https://price-workshop.org"
baseurl: ""
repository: "price-workshop/price-workshop"

# GitHub Pages Configuration
github:
  is_project_page: false

# Author/Contact Information
author:
  name: "PRICE Workshop Organizers"
  email: "info@price-workshop.org"
  url: "https://price-workshop.org"

# Collection configuration
collections:
  speakers:
    output: true
    permalink: /:name/
  papers:
    output: true
    permalink: /papers/:name/
  events:
    output: true
    permalink: /program/:name/

# Jekyll Configuration
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "speakers"
    values:
      layout: "speaker"
  - scope:
      path: ""
      type: "papers"
    values:
      layout: "paper"

# Build Settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  math_engine: mathjax

# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - agents/
  - "*.log"
  - "*.yml.lock"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Footer
footer:
  copyright: "© 2026 PRICE Workshop. All rights reserved."
  links:
    - title: "SIGGRAPH 2026"
      url: "https://s2026.siggraph.org/"
    - title: "Twitter / X"
      url: "https://twitter.com/siggraph"