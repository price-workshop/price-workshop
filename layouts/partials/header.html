{{ $mainCSS := resources.Get "css/main.css" }}
{{ $themeCSS := resources.Get "css/theme.css" }}
{{ $css := slice $mainCSS $themeCSS | resources.Concat "css/main.css" | minify }}

<header class="site-header">
  <nav class="nav-container" aria-label="Main navigation">
    <a href="/" class="logo">
      <span class="logo-text">PRICE</span>
      <span class="logo-subtitle">@ SIGGRAPH 2026</span>
    </a>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span class="hamburger"></span>
    </button>

    <ul class="nav-list">
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL }}" {{ if hasPrefix .URL "#" }}class="nav-link"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </nav>
</header>
