# Hugo Configuration for PRICE Workshop 2026

baseURL = "https://price-workshop.org/"
languageCode = "en-us"
title = "PRICE @ SIGGRAPH 2026"
theme = []

# Site Metadata
author = "PRICE Workshop Organizers"
copyright = "© 2026 PRICE Workshop. All rights reserved."

# Default time zone
timeZone = "America/New_York"

# Enable git info
enableGitInfo = true

# Enable robots.txt
enableRobotsTXT = true

# Minify related settings
minify = false

# Menu configuration
[[menu.main]]
  name = "About"
  url = "#about"
  weight = 1

[[menu.main]]
  name = "Program"
  url = "/program"
  weight = 2

[[menu.main]]
  name = "Speakers"
  url = "/speakers"
  weight = 3

[[menu.main]]
  name = "Registration"
  url = "/registration"
  weight = 4

[[menu.main]]
  name = "Venue"
  url = "/venue"
  weight = 5

[[menu.main]]
  name = "Contact"
  url = "/contact"
  weight = 6

[[menu.main]]
  name = "Submissions"
  url = "/call-for-submissions"
  weight = 7

# Markup configuration
[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      attribute = true
      autoHeadingID = true
      autoHeadingIDType = "github"
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

# Table of Contents configuration
[toc]
  startLevel = 2
  endLevel = 6

# Related content configuration
[related]
  threshold = 80
  includeNewer = true
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 100

# Social sharing
[social]
  twitter = "@siggraph"

# Output formats
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# Build configuration
[build]
  noJSConfigInAssets = false
  writeStats = true

# CacheBusters
[[cacheBusters]]
  path = "main\\.css"
  sub = "v=([0-9]+\\.[0-9]+\\.[0-9]+)"
[[cacheBusters]]
  path = "main\\.js"
  sub = "v=([0-9]+\\.[0-9]+\\.[0-9]+)"